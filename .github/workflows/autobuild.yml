name: Auto Build Pre-release

on:
  workflow_dispatch:

jobs:
  build-prerelease:
    name: Build Pre-release
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        arch: [amd64, arm64]
        mode: [portable, installer]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Setup Wails
        run: |
          $WailsVersion = (go list -m -f "{{.Version}}" github.com/wailsapp/wails/v2).Trim()
          go install "github.com/wailsapp/wails/v2/cmd/wails@$WailsVersion"
        shell: pwsh

      - name: Setup MSYS2 for ARM64 CGO
        id: msys2
        if: matrix.arch == 'arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          path-type: inherit
          install: mingw-w64-clang-aarch64-toolchain

      - name: Install NSIS
        if: matrix.mode == 'installer'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Configure build architecture
        run: |
          "GOOS=windows" >> $env:GITHUB_ENV
          "GOARCH=${{ matrix.arch }}" >> $env:GITHUB_ENV
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"

          if ("${{ matrix.arch }}" -eq "arm64") {
            $Msys2Location = "${{ steps.msys2.outputs.msys2-location }}"
            if ([string]::IsNullOrWhiteSpace($Msys2Location)) {
              throw "MSYS2 location output is empty."
            }

            $ClangArm64Bin = Join-Path $Msys2Location "clangarm64\bin"
            $Clang = Join-Path $ClangArm64Bin "clang.exe"
            $ClangXX = Join-Path $ClangArm64Bin "clang++.exe"
            if (!(Test-Path $Clang) -or !(Test-Path $ClangXX)) {
              throw "MSYS2 CLANGARM64 compiler was not found under $ClangArm64Bin."
            }
            $TargetTriple = "aarch64-w64-windows-gnu"
            $ClangTarget = (& $Clang --target=$TargetTriple -dumpmachine).Trim()
            if ($ClangTarget -notmatch "aarch64|arm64") {
              throw "MSYS2 CLANGARM64 compiler has unexpected target with --target=$TargetTriple`: $ClangTarget."
            }
            Write-Host "Using ARM64 CGO compiler: $Clang --target=$TargetTriple ($ClangTarget)"

            "MSYS2_LOCATION=$Msys2Location" >> $env:GITHUB_ENV
            "CGO_ENABLED=1" >> $env:GITHUB_ENV
            "CC=$Clang --target=$TargetTriple" >> $env:GITHUB_ENV
            "CXX=$ClangXX --target=$TargetTriple" >> $env:GITHUB_ENV
            $env:MSYS2_LOCATION = $Msys2Location
            $env:CGO_ENABLED = "1"
            $env:CC = "$Clang --target=$TargetTriple"
            $env:CXX = "$ClangXX --target=$TargetTriple"
            $env:PATH = "$ClangArm64Bin;$env:PATH"
            go env GOOS GOARCH GOHOSTOS GOHOSTARCH
            $ClangArm64Bin >> $env:GITHUB_PATH
          }
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Generate version info
        id: version_info
        run: |
          # 获取最新tag作为基础版本
          $LATEST_TAG = git describe --tags --abbrev=0 2>$null
          if (-not $LATEST_TAG) {
            $LATEST_TAG = "v0.0.0"
          }
          $BASE_VERSION = $LATEST_TAG -replace '^v', ''
          
          # 获取提交信息
          $COMMIT = "${{ github.sha }}".Substring(0,7)
          $COMMIT_COUNT = git rev-list --count HEAD
          $BUILD_TIME = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          
          # 生成预发布版本号: 基础版本-dev.提交次数+提交hash
          $VERSION = "$BASE_VERSION-dev.$COMMIT_COUNT+$COMMIT"
          
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "BASE_VERSION=$BASE_VERSION" >> $env:GITHUB_OUTPUT
          echo "COMMIT=$COMMIT" >> $env:GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $env:GITHUB_OUTPUT
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $env:GITHUB_OUTPUT
          
          Write-Host "Generated Version: $VERSION"
        shell: pwsh

      - name: Generate build env
        run: |
          $ErrorActionPreference = "Stop"
          $BangumiClientID = $env:LUNABOX_BANGUMI_CLIENT_ID
          $BangumiClientSecret = $env:LUNABOX_BANGUMI_CLIENT_SECRET
          $TouchGalToken = $env:LUNABOX_TOUCHGAL_TOKEN

          if ([string]::IsNullOrWhiteSpace($BangumiClientID) -xor [string]::IsNullOrWhiteSpace($BangumiClientSecret)) {
            throw "LUNABOX_BANGUMI_CLIENT_ID and LUNABOX_BANGUMI_CLIENT_SECRET must be configured together."
          }

          $Lines = @()
          if (![string]::IsNullOrWhiteSpace($BangumiClientID)) {
            $Lines += "LUNABOX_BANGUMI_CLIENT_ID=$BangumiClientID"
            $Lines += "LUNABOX_BANGUMI_CLIENT_SECRET=$BangumiClientSecret"
          }
          if (![string]::IsNullOrWhiteSpace($TouchGalToken)) {
            $Lines += "LUNABOX_TOUCHGAL_TOKEN=$TouchGalToken"
          }

          Set-Content -Path ".env.build" -Value $Lines -Encoding utf8
          Write-Host "Generated .env.build for build-time injection."
        shell: pwsh
        env:
          LUNABOX_BANGUMI_CLIENT_ID: ${{ vars.LUNABOX_BANGUMI_CLIENT_ID }}
          LUNABOX_BANGUMI_CLIENT_SECRET: ${{ secrets.LUNABOX_BANGUMI_CLIENT_SECRET }}
          LUNABOX_TOUCHGAL_TOKEN: ${{ secrets.LUNABOX_TOUCHGAL_TOKEN }}

      - name: Build with script
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\build.bat "${{ matrix.mode }}" "${{ steps.version_info.outputs.VERSION }}" "${{ matrix.arch }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          if ("${{ matrix.mode }}" -eq "portable") {
            $Artifact = "build/bin/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip"
          } else {
            $Artifact = "build/bin/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          }

          if (!(Test-Path $Artifact)) {
            Get-ChildItem -Path "build/bin" -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Build artifact not found: $Artifact"
          }
        shell: pwsh

      - name: Upload Unsigned Portable Artifact
        id: upload-unsigned-portable
        if: matrix.mode == 'portable'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-lunabox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable
          path: build/bin/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip
          if-no-files-found: error

      - name: Sign Portable Artifact
        if: matrix.mode == 'portable'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'test-signing' }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_PORTABLE_ARTIFACT_CONFIGURATION_SLUG || 'github-portable' }}
          github-artifact-id: ${{ steps.upload-unsigned-portable.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1200
          output-artifact-directory: signed

      - name: Verify signed portable artifact
        if: matrix.mode == 'portable'
        run: |
          $ErrorActionPreference = "Stop"
          $Artifact = "signed/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip"
          if (!(Test-Path $Artifact)) {
            Get-ChildItem -Path signed -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Signed portable artifact not found: $Artifact"
          }
        shell: pwsh

      - name: Upload Portable Artifact
        if: matrix.mode == 'portable'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable
          path: signed/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip
          if-no-files-found: error

      - name: Upload Unsigned Installer Artifact
        id: upload-unsigned-installer
        if: matrix.mode == 'installer'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-lunabox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-installer
          path: build/bin/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

      - name: Sign Installer Artifact
        if: matrix.mode == 'installer'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'test-signing' }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG || 'github-installer' }}
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1200
          output-artifact-directory: signed

      - name: Verify signed installer artifact
        if: matrix.mode == 'installer'
        run: |
          $ErrorActionPreference = "Stop"
          $Artifact = "signed/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          if (!(Test-Path $Artifact)) {
            Get-ChildItem -Path signed -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Signed installer artifact not found: $Artifact"
          }
        shell: pwsh

      - name: Upload Installer Artifact
        if: matrix.mode == 'installer'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-installer
          path: signed/LunaBox-${{ steps.version_info.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  create-prerelease:
    name: Create Pre-release
    needs: build-prerelease
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version info
        id: version_info
        run: |
          # 获取最新tag作为基础版本
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION=${LATEST_TAG#v}
          
          # 获取提交信息
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          
          # 生成预发布版本号
          VERSION="$BASE_VERSION-dev.$COMMIT_COUNT+$COMMIT"
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lunabox-*
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find ./artifacts -type f \( -name "*.zip" -o -name "*.exe" \) -exec cp {} ./release/ \;
          ls -lh ./release

      - name: Get commit messages
        id: get_commits
        run: |
          # 获取最近5个提交的信息
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" -n 5 >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          ## 🚀 LunaBox Development Build

          **⚠️ 这是一个自动构建的开发版本**
          
          ### 📋 版本信息
          
          - **版本号**: \`${{ steps.version_info.outputs.VERSION }}\`
          - **基于版本**: \`${{ steps.version_info.outputs.BASE_VERSION }}\`
          - **提交**: [\`${{ steps.version_info.outputs.COMMIT }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **构建时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ### 📝 最近提交
          
          ${{ steps.get_commits.outputs.COMMITS }}
          
          ### 📦 下载说明
          
          | 文件 | 说明 |
          |------|------|
          | \`*-portable.zip\` | 便携版，解压即用，数据存储在程序目录 |
          | \`*-setup.exe\` | 安装版，标准安装程序，数据存储在 %APPDATA%\\\\LunaBox |
          
          ### ⚠️ 注意事项
          
          - 此版本为**开发测试版本**，可能存在未知问题
          - 您可以用于测试最新功能，建议在测试环境使用，做好数据备份
          - 如果遇到问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈
          - 稳定版本请使用带版本号标签的正式发布版
          
          ### 🔗 相关链接
          
          - [查看完整提交历史](https://github.com/${{ github.repository }}/commits/master)
          - [报告问题](https://github.com/${{ github.repository }}/issues/new)
          - [查看正式发布版](https://github.com/${{ github.repository }}/releases)
          EOF

          cat release_notes.md

      - name: Delete old pre-release
        run: |
          # 删除旧的 dev-latest 标签和release
          gh release delete dev-latest --yes || true
          git push origin :refs/tags/dev-latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-latest
          git push -f origin dev-latest

      - name: Create Pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-latest
          name: "开发版 - ${{ steps.version_info.outputs.VERSION }}"
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
